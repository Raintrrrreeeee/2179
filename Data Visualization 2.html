<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>FIT2179 Data Visualization Poster</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #2c3e50;
            line-height: 1.7;
            margin: 0;
            padding: 40px 0;
        }

        /* 扩大容器，给并排图表足够空间 */
        .poster-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 50px 70px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
        }

        h1 { font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        h2.zone-title { font-size: 1.8em; color: #e74c3c; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 50px; }
        p.description { font-size: 1.1em; color: #555; margin-bottom: 30px; text-align: justify; }

        /* ========================================== */
        /* 第一分区：最稳定、不裁剪的 Flex 左右布局 */
        /* ========================================== */
        .zone1-layout {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            align-items: stretch; /* 保证左右两侧高度拉平 */
        }

        /* 左侧地图盒子 (占 60%) */
        .zone1-left {
            width: 60%;
            position: relative; /* 核心：为 1.2 的悬浮提供绝对锚点 */
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 修复 1.2 消失的核心：独立的包裹层，绝不被 Vega 覆盖属性 */
        .chart-inset-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999; /* 强制最高层级 */
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* 右侧图 2 与图 3 盒子 (占 40%) */
        .zone1-right {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .zone1-right .chart-box {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            flex: 1; /* 强制平分上下高度，图 3 绝不会被挤掉 */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <h1>E-commerce Battleground in Malaysia</h1>
        <p class="description">Introduction text goes here.</p>

        <h2 class="zone-title">ZONE I: MACRO LANDSCAPE</h2>

        <div class="zone1-layout">
            <div class="zone1-left">
                <div id="vis1_1"></div>
                <div class="chart-inset-wrapper">
                    <div id="vis1_2"></div>
                </div>
            </div>

            <div class="zone1-right">
                <div class="chart-box" id="vis2"></div>
                <div class="chart-box" id="vis3"></div>
            </div>
        </div>

        <p class="description">Description for Figure 1, 2, and 3.</p>

        <h2 class="zone-title">ZONE II: THE CLASH OF TITANS</h2>
        <div class="chart-container" id="vis4"></div>
        <p class="description">Description for Figure 4.</p>
        <div class="chart-container" id="vis5"></div>
        <p class="description">Description for Figure 5.</p>
        <div class="chart-container" id="vis6"></div>
        <p class="description">Description for Figure 6.</p>
        <div class="chart-container" id="vis7"></div>
        <p class="description">Description for Figure 7.</p>
    </div>

    <script>
        const opt = {actions: false};
        
        // 1.1 
        const url1_1 = "https://raw.githubusercontent.com/Raintrrrreeeee/2179/refs/heads/DV2/FIT2179%20DV2/Json%20Files/1.1Mapping%20the%20Seller%20Landscape.vl.json";
        vegaEmbed('#vis1_1', url1_1, opt).catch(console.error);

        // ⚠️ 警告：请务必检查这里的文件名！如果 GitHub 上没有这个名字，它绝对显示不出来。
        const url1_2 = "https://raw.githubusercontent.com/Raintrrrreeeee/2179/refs/heads/DV2/FIT2179%20DV2/Json%20Files/1.2Mapping%20the%20Seller%20Landscape.vl.json";
        vegaEmbed('#vis1_2', url1_2, opt).catch(console.error);

        // 2
        const url2 = "https://raw.githubusercontent.com/Raintrrrreeeee/2179/refs/heads/DV2/FIT2179%20DV2/Json%20Files/2The%20Five-Year%20Revenue%20Surge.vl.json";
        vegaEmbed('#vis2', url2, opt).catch(console.error);

        // ⚠️ 警告：请核对这里的图 3 名字是否正确！
        const url3 = "https://raw.githubusercontent.com/Raintrrrreeeee/2179/refs/heads/DV2/FIT2179%20DV2/Json%20Files/3Deconstructing%20the%20Digital%20Cart.vl.json";
        vegaEmbed('#vis3', url3, opt).catch(console.error);
        
        // ZONE 2 Scripts (省略，请直接保留你原来的)
    </script>
</body>
</html>
